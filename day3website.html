<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            min-width: 350px;
        }

        #greeting {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 1px;
            color: #e0e0e0;
        }

        #time {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        #date-day {
            font-size: 1.2rem;
            font-weight: 300;
            color: #b0c4de;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="greeting">Hello!</div>
        <div id="time">00:00:00 AM</div>
        <div id="date-day">Day, Month 00, 0000</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // 1. Extract Time Components
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // 2. Determine AM/PM and 12-Hour Format
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // The hour '0' should be '12'
            const formattedHours = String(hours).padStart(2, '0');

            // 3. Update Time Display
            document.getElementById('time').textContent = `${formattedHours}:${minutes}:${seconds} ${ampm}`;

            // 4. Update Greeting Based on 24-Hour Time
            const currentHour24 = now.getHours();
            let greetingText = "Good Evening"; // Default fallback

            if (currentHour24 >= 5 && currentHour24 < 12) {
                greetingText = "Good Morning";
            } else if (currentHour24 >= 12 && currentHour24 < 17) {
                greetingText = "Good Afternoon";
            } else if (currentHour24 >= 17 || currentHour24 < 5) {
                greetingText = "Good Evening";
            }
            document.getElementById('greeting').textContent = greetingText;

            // 5. Extract and Format Date/Day
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            
            const dayName = days[now.getDay()];
            const monthName = months[now.getMonth()];
            const dateNum = now.getDate();
            const year = now.getFullYear();

            // Update Date Display
            document.getElementById('date-day').textContent = `${dayName}, ${monthName} ${dateNum}, ${year}`;
        }

        // Run the clock immediately on load
        updateClock();
        
        // Update the clock every 1 second (1000 milliseconds)
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
